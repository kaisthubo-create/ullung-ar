<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* 조절 UI 패널 */
      #controls {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 85%; background: rgba(0,0,0,0.75); padding: 15px; border-radius: 20px;
        z-index: 10; color: white; font-family: sans-serif; font-size: 12px;
      }
      .control-group { margin-bottom: 10px; }
      input[type=range] { width: 100%; height: 15px; margin-top: 5px; }
      .label-row { display: flex; justify-content: space-between; font-weight: bold; }
    </style>
  </head>
  <body>
    <div id="controls">
      <div class="control-group">
        <div class="label-row"><span>↔ 좌우 위치</span><span id="val-x">0</span></div>
        <input type="range" id="pos-x" min="-2" max="2" step="0.1" value="0">
      </div>
      <div class="control-group">
        <div class="label-row"><span>↕ 상하 위치</span><span id="val-y">0</span></div>
        <input type="range" id="pos-y" min="-2" max="2" step="0.1" value="0">
      </div>
      <div class="control-group">
        <div class="label-row"><span>🔍 크기 조절</span><span id="val-s">1.0</span></div>
        <input type="range" id="scale-slider" min="0.1" max="4" step="0.1" value="1">
      </div>
      <div class="control-group">
        <div class="label-row"><span>🔄 회전(방향)</span><span id="val-r">0°</span></div>
        <input type="range" id="rotation-slider" min="0" max="360" step="1" value="0">
      </div>
      <div style="text-align: center; font-size: 10px; opacity: 0.8;">인식 후 30초 유지 | 원하는 구도를 잡고 캡처하세요!</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; filterMinCF:0.001; filterBeta: 0.01; missTolerance: 1800;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: true">
      
      <a-assets>
        <img id="angel-char" src="./character.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-image 
          id="character-model"
          src="#angel-char" 
          position="0 0 0.1" 
          width="1" height="1">
        </a-image>
      </a-entity>
    </a-scene>

    <script>
      const model = document.querySelector('#character-model');
      
      // 컨트롤 요소들
      const ctrlX = document.querySelector('#pos-x');
      const ctrlY = document.querySelector('#pos-y');
      const ctrlS = document.querySelector('#scale-slider');
      const ctrlR = document.querySelector('#rotation-slider');

      // 값 표시 요소들
      const valX = document.querySelector('#val-x');
      const valY = document.querySelector('#val-y');
      const valS = document.querySelector('#val-s');
      const valR = document.querySelector('#val-r');

      function updateTransform() {
        const x = ctrlX.value;
        const y = ctrlY.value;
        const s = ctrlS.value;
        const r = ctrlR.value;

        // 위치 업데이트 (Z축은 0.1 고정)
        model.setAttribute('position', `${x} ${y} 0.1`);
        // 크기 업데이트 (가로세로 비율 유지)
        model.setAttribute('scale', `${s} ${s} ${s}`);
        // 회전 업데이트
        model.setAttribute('rotation', `0 0 ${r}`);

        // 텍스트 업데이트
        valX.innerText = x;
        valY.innerText = y;
        valS.innerText = s;
        valR.innerText = r + '°';
      }

      // 모든 슬라이더에 이벤트 리스너 추가
      [ctrlX, ctrlY, ctrlS, ctrlR].forEach(ctrl => {
        ctrl.addEventListener('input', updateTransform);
      });
    </script>
  </body>
</html>
