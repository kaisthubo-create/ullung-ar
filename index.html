<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; }
      #info-panel {
        position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
        border-radius: 20px; font-family: sans-serif; font-size: 13px;
        z-index: 10; text-align: center; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="info-panel">
      👉 캐릭터를 <b>손가락으로 밀어서</b> 이동시키세요!<br>
      👆 화면을 <b>짧게 터치</b>하면 크기가 커집니다. (30초 유지)
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; filterMinCF:0.001; filterBeta: 0.01; missTolerance: 1800;" 
      color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
      
      <a-assets>
        <img id="angel-char" src="./character.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-image 
          id="character-model"
          src="#angel-char" 
          position="0 0 0.1" 
          width="1" height="1"
          class="clickable">
        </a-image>
      </a-entity>
    </a-scene>

    <script>
      const model = document.querySelector('#character-model');
      let isDragging = false;
      let startX, startY;
      let currentX = 0, currentY = 0;
      let currentScale = 1.0;

      // 1. 드래그 위치 이동 로직
      window.addEventListener('touchstart', (e) => {
        isDragging = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      });

      window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;

        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;

        // 화면 이동 거리 계산 (감도 조절을 위해 0.005 곱함)
        const diffX = (touchX - startX) * 0.005;
        const diffY = (startY - touchY) * 0.005;

        currentX += diffX;
        currentY += diffY;

        model.setAttribute('position', `${currentX} ${currentY} 0.1`);

        startX = touchX;
        startY = touchY;
      });

      window.addEventListener('touchend', () => {
        isDragging = false;
      });

      // 2. 짧은 터치 시 크기 조절 (탭 방식)
      window.addEventListener('click', () => {
        currentScale += 0.3;
        if (currentScale > 4) currentScale = 0.5; // 너무 커지면 다시 작게
        model.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      });
    </script>
  </body>
</html>
