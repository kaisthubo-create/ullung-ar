<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; font-family: 'Malgun Gothic', sans-serif; }
      
      /* UI 컨테이너 */
      #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 1000; pointer-events: none; }

      /* 상단 안내바 */
      #top-info {
        position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
        border-radius: 25px; font-size: 13px; text-align: center; width: 85%; line-height: 1.5;
      }

      /* 동그란 촬영 버튼 */
      #capture-trigger {
        position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 75px; height: 75px; background: white; border: 6px solid #ddd;
        border-radius: 50%; pointer-events: auto; box-shadow: 0 0 15px rgba(0,0,0,0.4);
      }
      #capture-trigger:active { background: #eee; scale: 0.9; }

      /* 스크린샷 안내 팝업 */
      #guide-overlay {
        display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(255,255,255,0.95); color: #333; padding: 25px;
        border-radius: 20px; text-align: center; z-index: 2000; width: 80%;
        box-shadow: 0 0 30px rgba(0,0,0,0.5); pointer-events: auto;
      }
      .guide-title { font-size: 18px; font-weight: bold; color: #e74c3c; margin-bottom: 15px; }
      .guide-text { font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
      .highlight { color: #2980b9; font-weight: bold; }
      #close-guide {
        background: #333; color: white; border: none; padding: 10px 20px;
        border-radius: 10px; font-size: 14px; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <div id="top-info">
        🖐️ <b>드래그:</b> 이동 | ✌️ <b>두 손가락:</b> 회전<br>
        👆 <b>터치:</b> 크기 조절 (30초 유지)
      </div>
      <div id="capture-trigger"></div>
    </div>

    <div id="guide-overlay">
      <div class="guide-title">📸 지금 촬영하세요!</div>
      <div class="guide-text">
        스마트폰의 <span class="highlight">[전원 버튼]</span>과<br>
        <span class="highlight">[음량 아래(-) 버튼]</span>을<br>
        동시에 <b>꾹!</b> 눌러 스크린샷을 찍으세요.
      </div>
      <button id="close-guide">확인 (화면 깨끗이 하기)</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; filterMinCF:0.001; filterBeta: 0.01; missTolerance: 1800;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
      
      <a-assets>
        <img id="angel-char" src="./character.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-image id="angel-model" src="#angel-char" position="0 0 0.1" width="1" height="1"></a-image>
      </a-entity>
    </a-scene>

    <script>
      const model = document.querySelector('#angel-model');
      const uiLayer = document.querySelector('#ui-layer');
      const guideOverlay = document.querySelector('#guide-overlay');
      const captureTrigger = document.querySelector('#capture-trigger');
      const closeGuide = document.querySelector('#close-guide');
      
      let currentPos = {x: 0, y: 0}, currentScale = 1.0, currentRot = 0;
      let startX, startY, startAngle;

      // 1. 촬영 버튼 클릭 시 가이드 표시
      captureTrigger.addEventListener('click', () => {
        guideOverlay.style.display = 'block';
      });

      // 2. 가이드 닫기 클릭 시 모든 UI 숨기기 (깨끗한 촬영 모드)
      closeGuide.addEventListener('click', () => {
        guideOverlay.style.display = 'none';
        uiLayer.style.display = 'none';
        
        // 5초 후 촬영이 끝났을 것으로 보고 UI 다시 표시 (혹은 화면 터치 시 복구)
        setTimeout(() => { uiLayer.style.display = 'block'; }, 5000);
      });

      // 화면 터치 시 UI 즉시 복구
      window.addEventListener('click', (e) => {
        if (uiLayer.style.display === 'none') { uiLayer.style.display = 'block'; }
      });

      // 3. 조작 로직 (이동, 회전, 크기)
      window.addEventListener('touchstart', (e) => {
        if(e.target === captureTrigger || e.target === closeGuide) return;
        if (e.touches.length === 1) {
          startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          startAngle = Math.atan2(dy, dx);
        }
      });

      window.addEventListener('touchmove', (e) => {
        if(e.target === captureTrigger || e.target === closeGuide) return;
        if (e.touches.length === 1) { // 이동
          const dx = (e.touches[0].clientX - startX) * 0.005;
          const dy = (startY - e.touches[0].clientY) * 0.005;
          currentPos.x += dx; currentPos.y += dy;
          model.setAttribute('position', `${currentPos.x} ${currentPos.y} 0.1`);
          startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        } else if (e.touches.length === 2) { // 회전
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const angle = Math.atan2(dy, dx);
          currentRot += (angle - startAngle) * (180 / Math.PI);
          model.setAttribute('rotation', `0 0 ${currentRot}`);
          startAngle = angle;
        }
      });

      window.addEventListener('touchend', (e) => {
        if(e.target === captureTrigger || e.target === closeGuide) return;
        if (e.touches.length === 0) { // 터치 끝날 때 크기 조절
          currentScale += 0.3;
          if (currentScale > 4) currentScale = 0.5;
          model.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        }
      });
    </script>
  </body>
</html>
